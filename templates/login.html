<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – DentalCare Pro</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="auth-body">
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo"><i class="fas fa-tooth"></i></div>
      <h1>DentalCare Pro</h1>
      <p>Sign in to your admin dashboard</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">
            <i class="fas fa-{{ 'check-circle' if category == 'success' else 'exclamation-circle' if category == 'danger' else 'info-circle' }}"></i>
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" class="auth-form" novalidate>
      <div class="form-group">
        <label><i class="fas fa-user"></i> Username</label>
        <input type="text" name="username" required placeholder="Enter your username" autofocus>
      </div>
      <div class="form-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <div class="pw-wrap">
          <input type="password" name="password" id="login-pw" required placeholder="Enter your password">
          <button type="button" class="pw-eye" onclick="togglePw('login-pw','eye1')">
            <i class="fas fa-eye" id="eye1"></i>
          </button>
        </div>
      </div>
      <div class="form-check">
        <input type="checkbox" name="remember" id="remember">
        <label for="remember">Remember me</label>
      </div>
      <button type="submit" class="btn btn-primary btn-block">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>
    <div class="auth-footer">
      <p>Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
    </div>
  </div>
</div>

<button class="theme-toggle float-theme" onclick="toggleTheme()" title="Toggle theme">
  <i class="fas fa-moon" id="theme-icon"></i>
</button>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
